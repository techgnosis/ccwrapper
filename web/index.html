<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>agentbox</title>
  <link rel="stylesheet" href="pico.min.css">
  <style>
    :root {
      --turn-bg: rgba(255,255,255,0.03);
      --tool-bg: rgba(100,149,237,0.08);
      --result-bg: rgba(50,205,50,0.06);
      --error-bg: rgba(255,80,80,0.1);
      --thinking-bg: rgba(180,130,255,0.06);
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 0.5rem 1rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      border-bottom: 1px solid var(--pico-muted-border-color);
      flex-shrink: 0;
    }

    header h1 {
      margin: 0;
      font-size: 1.1rem;
      opacity: 0.7;
      flex-shrink: 0;
    }

    #prompt-input {
      flex: 1;
      margin: 0;
      font-size: 0.9rem;
      resize: none;
      overflow: hidden;
      height: 2.5rem;
    }

    header.answer-mode {
      align-items: flex-start;
    }

    header.answer-mode #prompt-input {
      height: 50vh;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: var(--pico-font-family-monospace);
      font-size: 0.82rem;
    }

    #btn-send {
      flex-shrink: 0;
      margin: 0;
      padding: 0.5rem 1rem;
    }

    #btn-stop {
      flex-shrink: 0;
      margin: 0;
      padding: 0.5rem 1rem;
      background: var(--pico-del-color);
      border-color: var(--pico-del-color);
      display: none;
    }

    #btn-cancel-answer {
      flex-shrink: 0;
      margin: 0;
      padding: 0.5rem 1rem;
      display: none;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--pico-muted-border-color);
      flex-shrink: 0;
    }

    .tab {
      padding: 0.4rem 1rem;
      cursor: pointer;
      opacity: 0.5;
      border-bottom: 2px solid transparent;
      font-size: 0.85rem;
    }

    .tab.active {
      opacity: 1;
      border-bottom-color: var(--pico-primary);
    }

    #scroll-indicator {
      margin-left: auto;
      font-size: 0.75rem;
      opacity: 0.5;
      padding: 0.4rem 0.5rem;
      align-self: center;
    }

    .panel {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 1rem;
      display: none;
    }

    .panel.active {
      display: block;
    }

    /* Turns */
    .turn {
      margin-bottom: 0.5rem;
      border-left: 3px solid var(--pico-muted-border-color);
      background: var(--turn-bg);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
    }

    .turn.collapsed .turn-body {
      display: none;
    }

    .block.collapsed {
      max-height: 1.8em;
      overflow: hidden;
      cursor: pointer;
    }

    .turn-summary {
      padding: 0.4rem 0.6rem;
      font-size: 0.82rem;
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .turn-summary .label {
      font-weight: 600;
      opacity: 0.6;
      margin-right: 0.3rem;
      font-family: var(--pico-font-family-monospace);
      font-size: 0.78rem;
    }

    .turn-body {
      padding: 0 0.6rem 0.4rem;
    }

    /* Blocks inside a turn */
    .block {
      margin: 0.2rem 0;
      padding: 0.3rem 0.5rem;
      border-radius: 3px;
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .block-text {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .block-thinking {
      background: var(--thinking-bg);
      border-left: 2px solid rgba(180,130,255,0.4);
      font-style: italic;
      opacity: 0.7;
    }

    .block-tool {
      background: var(--tool-bg);
      border-left: 2px solid cornflowerblue;
    }

    .block-tool .tool-name {
      font-weight: 600;
      color: cornflowerblue;
      font-family: var(--pico-font-family-monospace);
      font-size: 0.78rem;
      margin-right: 0.4rem;
    }

    .block-tool .tool-input {
      opacity: 0.8;
      font-family: var(--pico-font-family-monospace);
      font-size: 0.78rem;
    }

    .block-result {
      background: var(--result-bg);
      border-left: 2px solid limegreen;
      margin-left: 1.5rem;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--pico-font-family-monospace);
      font-size: 0.78rem;
      max-height: 20em;
      overflow-y: auto;
    }

    .block-result.error {
      background: var(--error-bg);
      border-left-color: tomato;
    }

    .block-result-summary {
      background: rgba(50,205,50,0.08);
      border-top: 1px solid var(--pico-muted-border-color);
      padding: 0.4rem 0.6rem;
      font-size: 0.78rem;
      font-family: var(--pico-font-family-monospace);
      opacity: 0.7;
    }

    .block-result-summary span {
      margin-right: 1rem;
    }

    /* Pending indicator */
    .pending-line {
      font-family: var(--pico-font-family-monospace);
      font-size: 0.78rem;
      opacity: 0.4;
      padding: 0.3rem 0.5rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.6; }
    }

    /* Answer Question button */
    .btn-answer {
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      margin: 0.3rem 0.6rem;
      opacity: 0.6;
      cursor: pointer;
    }

    .btn-answer:hover {
      opacity: 1;
    }

    /* Context cleared divider */
    .context-cleared {
      text-align: center;
      padding: 0.6rem 0;
      margin: 0.8rem 0;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0.5;
      border-top: 1px solid var(--pico-muted-border-color);
      border-bottom: 1px solid var(--pico-muted-border-color);
      font-family: var(--pico-font-family-monospace);
    }

    /* Context tab */
    #context-panel pre {
      font-size: 0.78rem;
      max-height: 40vh;
      overflow-y: auto;
    }

    #context-panel h4 {
      margin: 0.5rem 0 0.3rem;
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .ctx-clear-wrap {
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
    }

    .ctx-clear-wrap button {
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem;
    }

    /* System prompt tab */
    #system-prompt-input {
      width: 100%;
      min-height: 60vh;
      font-family: var(--pico-font-family-monospace);
      font-size: 0.82rem;
      resize: vertical;
    }
  </style>
</head>
<body>
  <header>
    <h1>agentbox</h1>
    <textarea id="prompt-input" rows="1" placeholder="Enter prompt..." autofocus></textarea>
    <button id="btn-send">Send</button>
    <button id="btn-stop">Stop</button>
    <button id="btn-cancel-answer">Cancel</button>
  </header>

  <div class="tabs">
    <div class="tab active" data-panel="output-panel">Output</div>
    <div class="tab" data-panel="context-panel">Context</div>
    <div class="tab" data-panel="system-prompt-panel">System Prompt</div>
    <div class="tab" data-panel="init-panel">Init</div>
    <span id="scroll-indicator">scroll: on</span>
  </div>

  <div id="output-panel" class="panel active"></div>

  <div id="context-panel" class="panel">
    <div class="ctx-clear-wrap">
      <button id="btn-refresh-ctx">Refresh</button>
      <button id="btn-clear">Clear Context</button>
    </div>
    <div id="context-content"></div>
  </div>

  <div id="init-panel" class="panel">
    <pre id="init-content" style="font-size:0.78rem;white-space:pre-wrap;word-break:break-word;">(no init data yet — send a prompt first)</pre>
  </div>

  <div id="system-prompt-panel" class="panel">
    <div class="ctx-clear-wrap">
      <button id="btn-save-sysprompt">Save</button>
    </div>
    <textarea id="system-prompt-input" placeholder="Enter system prompt..."></textarea>
  </div>

  <script src="app.js"></script>
</body>
</html>
